name: CI/CD - Cloud Infrastructure Monitoring System

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_API: ${{ secrets.DOCKERHUB_USERNAME }}/cloud-infra-monitoring-api
  IMAGE_METRICS_AGENT: ${{ secrets.DOCKERHUB_USERNAME }}/cloud-infra-metrics-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api-service
          file: ./api-service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}

      - name: Build and push Metrics Agent image
        uses: docker/build-push-action@v6
        with:
          context: ./metrics-agent
          file: ./metrics-agent/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_METRICS_AGENT }}:latest
            ${{ env.IMAGE_METRICS_AGENT }}:${{ github.sha }}

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare .env for production
        run: |
          cat > .env <<EOF
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG=${{ github.sha }}
          MONGO_URI=${{ secrets.MONGO_URI }}
          GF_ADMIN_USER=${{ secrets.GF_ADMIN_USER }}
          GF_ADMIN_PASSWORD=${{ secrets.GF_ADMIN_PASSWORD }}
          EOF

      - name: Copy files to EC2 via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".env,docker-compose.prod.yml,monitoring,deploy"
          target: "~/cloud-infra-monitoring"

      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/cloud-infra-monitoring
            docker compose -f docker-compose.prod.yml pull || true
            docker compose -f docker-compose.prod.yml up -d

