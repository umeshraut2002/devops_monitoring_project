global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "metrics-agent"
    static_configs:
      - targets: ["metrics-agent:9100"]

  - job_name: "api-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-service:3000"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

