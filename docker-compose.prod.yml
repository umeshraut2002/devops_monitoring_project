version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - monitoring_net

  api-service:
    image: ${DOCKERHUB_USERNAME}/cloud-infra-monitoring-api:${IMAGE_TAG-latest}
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      - API_PORT=3000
      - MONGO_URI=${MONGO_URI-mongodb://mongo:27017/cloud_monitoring}
      - NODE_ENV=production
    networks:
      - monitoring_net

  metrics-agent:
    image: ${DOCKERHUB_USERNAME}/cloud-infra-metrics-agent:${IMAGE_TAG-latest}
    restart: unless-stopped
    environment:
      - METRICS_AGENT_PORT=9100
      - SCRAPE_INTERVAL_SECONDS=5
    networks:
      - monitoring_net

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - monitoring_net

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - monitoring_net

  node-exporter:
    image: prom/node-exporter:v1.8.1
    restart: unless-stopped
    pid: "host"
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"
    networks:
      - monitoring_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api-service
      - grafana
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - monitoring_net

networks:
  monitoring_net:
    driver: bridge

volumes:
  mongo-data:
  grafana-data:

